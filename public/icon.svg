<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Company Profiler app icon (full-bleed, maskable): a sage line-drawn city skyline on a dark plate">
  <!-- Solid --surface plate, full-bleed so launchers can crop it to any shape. -->
  <rect x="0" y="0" width="512" height="512" fill="#1D231C"/>
  <!-- Dominant form: skyline outline drawn in stroke (fill=none), 28px weight,
       rounded caps/joins — the house style (§7). Three open building outlines
       tied together by a ground baseline; all content sits inside the ~205px
       maskable safe zone. -->
  <g fill="none" stroke="#7D9B83" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <path d="M134 350 H379"/>
    <path d="M134 350 V235 H194 V350"/>
    <path d="M234 350 V160 H294 V350"/>
    <path d="M332 350 V270 H379 V350"/>
  </g>
  <!-- Secondary/detail strokes: lighter floor lines in the tall tower, pushed
       back so the dominant form stays dominant (§7). -->
  <g fill="none" stroke="#7D9B83" stroke-width="7" stroke-linecap="round" opacity="0.7">
    <path d="M234 230 H294"/>
    <path d="M234 290 H294"/>
  </g>
  <!-- Highlight detail: a single small lit window in --text, used sparingly. -->
  <circle cx="264" cy="195" r="9" fill="#E6E4DB"/>
</svg>
